name: Generate Snake

on:
  schedule:
    # runs daily at 00:00 UTC
    - cron: "0 0 * * *"
  # run on push to main
  push:
    branches:
      - main
  # allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gen
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=%23A06CD5&color_dots=%23fbeffb,%23f4c6e6,%23e88fc9,%23c95fa5,%23A06CD5
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23F49AC2

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
